services:
  mysql:
    image: mysql:8
    container_name: debt_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: debtdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - debts-network

  redis:
    image: redis:7
    container_name: debts-redis
    ports:
      - "6379:6379"
    networks:
      - debts-network

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.2
    container_name: debts-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:19092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:19092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    networks:
      - debts-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: debts-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    networks:
      - debts-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - debts-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - debts-network

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - debts-network

  prometheus:
    image: prom/prometheus:latest
    container_name: debts-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - debts-network

  grafana:
    image: grafana/grafana:latest
    container_name: debts-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - debts-network

  credit-score-api:
    build:
      context: .
      dockerfile: CreditScore.Api/Dockerfile
    container_name: credit-score-api
    ports:
      - "5017:8080"
      - "5017:8080"   # HTTP
      - "5018:5018"   # gRPC
    environment:
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=creditscoredb;Uid=root;Pwd=root;"
      Kafka__BootstrapServers: "kafka:19092"
      ASPNETCORE_ENVIRONMENT: "Development"
      Redis__ConnectionString: "redis:6379"
      Kestrel__Endpoints__Http__Url: "http://0.0.0.0:8080"
      Kestrel__Endpoints__Grpc__Url: "http://0.0.0.0:5018"
      Kestrel__Endpoints__Grpc__Protocols: "Http2"
    depends_on:
      - mysql
      - kafka
      - redis
    networks:
      - debts-network

  debts-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: debts-api
    ports:
      - "5235:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Default: Information
      Logging__LogLevel__Microsoft.AspNetCore: Warning
      ConnectionStrings__Default: "server=mysql;port=3306;database=debtdb;user=root;password=root"
      AllowedHosts: "*"
      Redis__ConnectionString: "redis:6379"
      Kafka__BootstrapServers: "kafka:19092"
      Jwt__Key: super-secret-key-with-many-characters
      Jwt__Issuer: DebtsAPI
      Jwt__Audience: DebtsAPI
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Auth__Pepper: un-secreto-largo-y-random-que-solo-vive-en-config
      Email__Host: mailhog
      Email__Port: 1025
      Email__From: noreply@debts.com
      CreditScore__BaseUrl: "http://credit-score-api:8080"
      OpenTelemetry__Endpoint: "http://jaeger:4317"
    depends_on:
      mysql:
        condition: service_started
      kafka:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      jaeger:
        condition: service_started
      mailhog:
        condition: service_started
      credit-score-api:
        condition: service_started
    networks:
      - debts-network

volumes:
  mysql_data:
  rabbitmq_data:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  debts-network:
    driver: bridge